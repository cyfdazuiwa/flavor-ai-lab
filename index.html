<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=430, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F7F5F0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>五行纳音 · 本命饮品</title>
    <meta name="description" content="基于五行相生相克与纳音理论，为你匹配专属饮品与最佳伴侣" />
    <!-- CDN 预连接，加速资源加载 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net">
    <!-- 首屏关键图片预加载 -->
    <link rel="preload" as="image" href="https://cdn.jsdelivr.net/gh/cyfdazuiwa/flavor-ai-lab@main/images/intro-animation.gif">
    <script type="module" crossorigin src="./assets/index-D_HQT8R9.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-DoybfhkN.css">
    <!-- html2canvas 截图库改为 defer，不阻塞首屏 -->
    <script defer src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <!-- 图片懒加载 -->
    <script>
      // 全局图片懒加载
      document.addEventListener('DOMContentLoaded', () => {
        const imageObserver = new IntersectionObserver((entries, observer) => {
          entries.forEach(entry => {
            if (entry.isIntersecting) {
              const img = entry.target;
              if (img.dataset.src) {
                img.src = img.dataset.src;
                img.removeAttribute('data-src');
              }
              observer.unobserve(img);
            }
          });
        }, {
          rootMargin: '50px 0px',
          threshold: 0.01
        });
        
        // 观察所有图片
        const observeImages = () => {
          document.querySelectorAll('img[data-src], img[src*="cdn.jsdelivr"]').forEach(img => {
            if (!img.dataset.src && img.src) {
              img.dataset.src = img.src;
              // 根据图片位置决定是否立即加载首屏图片
              const rect = img.getBoundingClientRect();
              const isInViewport = rect.top < window.innerHeight + 100;
              if (!isInViewport) {
                img.src = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
              }
            }
            imageObserver.observe(img);
          });
        };
        
        observeImages();
        // 动态内容加载后继续观察
        new MutationObserver(observeImages).observe(document.body, { childList: true, subtree: true });
      });
    </script>
    <style>
      /* 电脑端居中显示手机版 */
      @media (min-width: 431px) {
        html {
          background: #e5e5e5;
          display: flex;
          justify-content: center;
          min-height: 100vh;
        }
        body {
          width: 430px;
          max-width: 430px;
          background: #F7F5F0;
          box-shadow: 0 0 20px rgba(0,0,0,0.1);
          min-height: 100vh;
        }
      }
      /* 去掉图片白色圆形背景 */
      img {
        background: transparent !important;
        border-radius: 0 !important;
      }
      /* 针对可能有背景容器的图片 */
      img[src*="char-"] {
        background: none !important;
        background-color: transparent !important;
      }
    </style>
    <!-- Umami Analytics -->
    <script defer src="https://umami-production-35ec.up.railway.app/script.js" data-website-id="c594553c-1c3f-40b4-8d8a-f83705159a47"></script>
    <!-- 追踪用户结果页 -->
    <script>
      // 等待 Umami 加载
      function trackResult() {
        // 检查结果页特征：有 h1 标题且包含"的"字（如"测试的 燕麦可可"）
        const h1 = document.querySelector('h1');
        if (h1 && h1.textContent.includes('的')) {
          // 提取饮料名称（h1 后面的文字）
          const drinkName = h1.textContent.split('的')[1]?.trim() || 'unknown';
          
          // 提取纳音信息
          const nayinText = document.querySelector('p.text-sm.text-\\[\\#A8A29E\\]');
          const nayin = nayinText ? nayinText.textContent.replace('纳音：', '').trim() : 'unknown';
          
          // 发送 Umami 自定义事件
          if (typeof umami !== 'undefined') {
            umami.track('result_view', {
              drink: drinkName,
              nayin: nayin,
              url: window.location.href
            });
            console.log('Tracked result:', drinkName, nayin);
          }
        }
      }
      
      // 页面加载后检查
      document.addEventListener('DOMContentLoaded', () => {
        // 延迟检查，等待 React 渲染
        setTimeout(trackResult, 1000);
        setTimeout(trackResult, 3000);
      });
      
      // 监听 URL 变化（SPA 路由）
      let lastUrl = location.href;
      new MutationObserver(() => {
        const url = location.href;
        if (url !== lastUrl) {
          lastUrl = url;
          setTimeout(trackResult, 1000);
        }
      }).observe(document, { subtree: true, childList: true });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script src="./override-screenshot.js"></script>
    <script>
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js')
            .then((registration) => {
              console.log('SW registered:', registration.scope);
            })
            .catch((error) => {
              console.log('SW registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
